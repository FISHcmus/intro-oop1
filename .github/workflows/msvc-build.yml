name: Build Caro submission bundle (Windows VS 2022)

on:
  push:
    paths:
      - 'doancaro/**'
      - 'ci-assets/**'
      - '.github/workflows/msvc-build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Stage submission bundle
        shell: pwsh
        run: |
          $stage = "CaroGame_src"
          New-Item -ItemType Directory -Path $stage -Force | Out-Null

          # Source + assets (drop unused subdirs)
          Copy-Item -Recurse doancaro\src "$stage\"
          Copy-Item -Recurse doancaro\assets "$stage\"
          Remove-Item -Recurse -Force "$stage\assets\music"  -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "$stage\assets\sounds" -ErrorAction SilentlyContinue
          Get-ChildItem -Path "$stage\assets" -Recurse -Filter ".gitkeep" | Remove-Item -Force

          Copy-Item doancaro\demo.png "$stage\"

          # Hand-written, portable VS 2022 project files (no CMake involved)
          Copy-Item ci-assets\CaroGame.sln     "$stage\"
          Copy-Item ci-assets\CaroGame.vcxproj "$stage\"
          Copy-Item ci-assets\README.bundle.md "$stage\README.md"

      - name: Download raylib 5.5 source
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/raysan5/raylib/archive/refs/tags/5.5.tar.gz" -OutFile raylib.tar.gz
          tar -xzf raylib.tar.gz

      - name: Cache raylib.lib (saves ~3 min on repeat runs)
        id: cache-raylib
        uses: actions/cache@v4
        with:
          path: raylib-prebuilt
          key: raylib-5.5-vs2022-x64-static-v4

      - name: Build raylib.lib (static, v143, x64, Release)
        if: steps.cache-raylib.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          cmake -S raylib-5.5 -B raylib-build `
            -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_POLICY_DEFAULT_CMP0091=NEW `
            -DBUILD_EXAMPLES=OFF `
            -DBUILD_GAMES=OFF `
            -DCUSTOMIZE_BUILD=OFF `
            -DWITH_PIC=OFF
          cmake --build raylib-build --config Release --target raylib -- /m

          # Stage just the headers + static lib — nothing else
          New-Item -ItemType Directory -Path "raylib-prebuilt\include" -Force | Out-Null
          New-Item -ItemType Directory -Path "raylib-prebuilt\lib"     -Force | Out-Null
          Copy-Item "raylib-5.5\src\raylib.h"    "raylib-prebuilt\include\"
          Copy-Item "raylib-5.5\src\raymath.h"   "raylib-prebuilt\include\"
          Copy-Item "raylib-5.5\src\rlgl.h"      "raylib-prebuilt\include\"
          Copy-Item "raylib-build\raylib\Release\raylib.lib" "raylib-prebuilt\lib\"

      - name: Stage raylib into bundle
        shell: pwsh
        run: |
          $dst = "CaroGame_src\raylib"
          New-Item -ItemType Directory -Path "$dst\include" -Force | Out-Null
          New-Item -ItemType Directory -Path "$dst\lib"     -Force | Out-Null
          Copy-Item "raylib-prebuilt\include\*" "$dst\include\"
          Copy-Item "raylib-prebuilt\lib\*"     "$dst\lib\"

      - name: Smoke test — msbuild the hand-written solution
        shell: pwsh
        run: |
          # Find msbuild via vswhere
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $msbuild = & $vswhere -latest -requires Microsoft.Component.MSBuild -find "MSBuild\**\Bin\MSBuild.exe" | Select-Object -First 1
          Write-Host "MSBuild: $msbuild"

          & $msbuild "CaroGame_src\CaroGame.sln" /p:Configuration=Release /p:Platform=x64 /m /nologo /verbosity:minimal
          if ($LASTEXITCODE -ne 0) { throw "msbuild failed with exit code $LASTEXITCODE" }

      - name: Stage runnable binary + assets into bin/
        shell: pwsh
        run: |
          $bin = "CaroGame_src\bin"
          New-Item -ItemType Directory -Path $bin -Force | Out-Null
          Copy-Item "CaroGame_src\x64\Release\CaroGame.exe" "$bin\"
          Copy-Item -Recurse "CaroGame_src\assets" "$bin\assets"

      - name: Remove build outputs — teacher rebuilds
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force "CaroGame_src\x64" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "CaroGame_src\.vs" -ErrorAction SilentlyContinue
          Get-ChildItem -Path "CaroGame_src" -Recurse -Filter "*.obj"  | Remove-Item -Force -ErrorAction SilentlyContinue
          Get-ChildItem -Path "CaroGame_src" -Recurse -Filter "*.pdb"  | Remove-Item -Force -ErrorAction SilentlyContinue
          Get-ChildItem -Path "CaroGame_src" -Recurse -Filter "*.ilk"  | Remove-Item -Force -ErrorAction SilentlyContinue
          Get-ChildItem -Path "CaroGame_src" -Recurse -Filter "*.tlog" | Remove-Item -Force -ErrorAction SilentlyContinue

      - name: Portability gate — fail if any absolute path survives
        shell: pwsh
        run: |
          # Match Windows drive paths only. Exclude URL schemes like http://, xmlns="..."
          # by requiring a backslash (MSBuild-native separator in .vcxproj).
          $files = Get-ChildItem -Path "CaroGame_src" -File -Include *.sln,*.vcxproj,*.vcxproj.filters
          $leaks = $files | Select-String -Pattern '(?i)\b[A-Z]:\\' -AllMatches -ErrorAction SilentlyContinue
          if ($leaks) {
            Write-Host "=== ABSOLUTE PATH LEAKS — build non-portable ===" -ForegroundColor Red
            $leaks | ForEach-Object { Write-Host "$($_.Path):$($_.LineNumber): $($_.Line.Trim())" }
            exit 1
          }
          Write-Host "`u{2713} No absolute paths. Bundle is portable." -ForegroundColor Green

      - name: Upload portable bundle
        uses: actions/upload-artifact@v4
        with:
          name: CaroGame_src
          path: CaroGame_src/

      - name: Upload .sln/.vcxproj only (for quick inspection)
        uses: actions/upload-artifact@v4
        with:
          name: vs-project-files
          path: |
            CaroGame_src/*.sln
            CaroGame_src/*.vcxproj
