name: Build Caro submission bundle (Windows VS 2022)

on:
  push:
    paths:
      - 'doancaro/**'
      - 'ci-assets/**'
      - '.github/workflows/msvc-build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Stage submission bundle
        shell: pwsh
        run: |
          $stage = "CaroGame_src"
          New-Item -ItemType Directory -Path $stage -Force | Out-Null

          # Our source + assets (drop unused subdirs)
          Copy-Item -Recurse doancaro\src "$stage\"
          Copy-Item -Recurse doancaro\assets "$stage\"
          Remove-Item -Recurse -Force "$stage\assets\rapfi"  -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "$stage\assets\music"  -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "$stage\assets\sounds" -ErrorAction SilentlyContinue
          Get-ChildItem -Path "$stage\assets" -Recurse -Filter ".gitkeep" | Remove-Item -Force

          Copy-Item doancaro\demo.png "$stage\"

          # Portable CMakeLists + README
          Copy-Item ci-assets\CMakeLists.bundle.txt "$stage\CMakeLists.txt"
          Copy-Item ci-assets\README.bundle.md      "$stage\README.md"

          # Bundle raylib 5.5 source (offline build)
          Invoke-WebRequest -Uri "https://github.com/raysan5/raylib/archive/refs/tags/5.5.tar.gz" -OutFile raylib.tar.gz
          tar -xzf raylib.tar.gz -C $stage
          # Strip raylib extras not needed to build
          Remove-Item -Recurse -Force "$stage\raylib-5.5\examples"      -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "$stage\raylib-5.5\projects"      -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "$stage\raylib-5.5\parser"        -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "$stage\raylib-5.5\logo"          -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "$stage\raylib-5.5\.github"       -ErrorAction SilentlyContinue

      - name: Generate VS 2022 solution (portable)
        shell: pwsh
        run: |
          cmake -S CaroGame_src -B CaroGame_src\vs2022 `
            -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_SUPPRESS_REGENERATION=TRUE `
            -DCMAKE_POLICY_DEFAULT_CMP0091=NEW

      - name: Build .exe (smoke test — proves the .sln compiles)
        shell: pwsh
        run: cmake --build CaroGame_src\vs2022 --config Release -- /m

      - name: Clean non-portable CMake artifacts, keep .sln + .vcxproj
        shell: pwsh
        run: |
          $vs = "CaroGame_src\vs2022"

          # Remove build outputs — teacher rebuilds
          Get-ChildItem -Path $vs -Recurse -Directory -Filter "Release" | Remove-Item -Recurse -Force -ErrorAction SilentlyContinue
          Get-ChildItem -Path $vs -Recurse -Directory -Filter "Debug"   | Remove-Item -Recurse -Force -ErrorAction SilentlyContinue
          Get-ChildItem -Path $vs -Recurse -Directory -Filter "x64"     | Remove-Item -Recurse -Force -ErrorAction SilentlyContinue

          # Strip CMake-generated cache files (contain absolute runner paths)
          Get-ChildItem -Path $vs -Recurse -Directory -Filter "CMakeFiles" | Remove-Item -Recurse -Force
          Get-ChildItem -Path $vs -Recurse -File      -Filter "CMakeCache.txt"      | Remove-Item -Force
          Get-ChildItem -Path $vs -Recurse -File      -Filter "cmake_install.cmake" | Remove-Item -Force
          Get-ChildItem -Path $vs -Recurse -File      -Filter "CPackConfig.cmake"    | Remove-Item -Force -ErrorAction SilentlyContinue
          Get-ChildItem -Path $vs -Recurse -File      -Filter "CPackSourceConfig.cmake" | Remove-Item -Force -ErrorAction SilentlyContinue

          # Drop CMake-housekeeping vcxproj projects (ALL_BUILD, ZERO_CHECK, INSTALL, PACKAGE)
          # Teacher only needs CaroGame + raylib targets.
          $housekeeping = @("ALL_BUILD", "ZERO_CHECK", "INSTALL", "PACKAGE")
          foreach ($name in $housekeeping) {
              Get-ChildItem -Path $vs -Recurse -File -Filter "$name.vcxproj*" | Remove-Item -Force -ErrorAction SilentlyContinue
          }

      - name: Rewrite absolute paths to $(SolutionDir) macros — makes bundle portable
        shell: pwsh
        run: |
          $vs = "CaroGame_src\vs2022"
          $workspace = (Resolve-Path "CaroGame_src").Path              # D:\a\...\CaroGame_src
          $workspaceBs = $workspace.TrimEnd('\') + '\'
          $workspaceFs = ($workspace -replace '\\','/').TrimEnd('/') + '/'
          $vsBs = (Resolve-Path $vs).Path.TrimEnd('\') + '\'
          $vsFs = ($vsBs -replace '\\','/')

          Write-Host "Rewriting paths in $vs ..."
          Write-Host "  '$vsBs'        → '`$(SolutionDir)'"
          Write-Host "  '$workspaceBs' → '`$(SolutionDir)..\\'"

          $files = Get-ChildItem -Path $vs -Recurse -File -Include *.sln,*.vcxproj,*.vcxproj.filters
          foreach ($f in $files) {
              $content = Get-Content $f.FullName -Raw

              # Order matters: longest prefix first (vs\ is inside workspace\)
              $content = $content.Replace($vsBs,        '$(SolutionDir)')
              $content = $content.Replace($vsFs,        '$(SolutionDir)')
              $content = $content.Replace($workspaceBs, '$(SolutionDir)..\')
              $content = $content.Replace($workspaceFs, '$(SolutionDir)../')

              # Free the hardcoded CMake path so teacher's PATH resolves it
              $content = $content.Replace('"C:\Program Files\CMake\bin\cmake.exe"', 'cmake.exe')
              $content = $content.Replace('C:\Program Files\CMake\bin\cmake.exe',    'cmake.exe')

              Set-Content -Path $f.FullName -Value $content -NoNewline -Encoding UTF8
          }

      - name: Portability gate — fail if any absolute path survives
        shell: pwsh
        run: |
          $leaks = Select-String -Path "CaroGame_src\vs2022\*.sln", `
                                       "CaroGame_src\vs2022\**\*.vcxproj", `
                                       "CaroGame_src\vs2022\**\*.vcxproj.filters" `
            -Pattern '(?i)[A-Z]:\\|[A-Z]:/' -AllMatches -ErrorAction SilentlyContinue
          if ($leaks) {
            Write-Host "=== ABSOLUTE PATH LEAKS — build non-portable ===" -ForegroundColor Red
            $leaks | ForEach-Object { Write-Host "$($_.Path):$($_.LineNumber): $($_.Line.Trim())" }
            exit 1
          }
          Write-Host "`u{2713} No absolute paths. Bundle is portable." -ForegroundColor Green

      - name: Upload portable bundle
        uses: actions/upload-artifact@v4
        with:
          name: CaroGame_src
          path: CaroGame_src/

      - name: Upload .sln/.vcxproj only (for quick inspection)
        uses: actions/upload-artifact@v4
        with:
          name: vs-project-files
          path: |
            CaroGame_src/vs2022/*.sln
            CaroGame_src/vs2022/**/*.vcxproj
            CaroGame_src/vs2022/**/*.vcxproj.filters
