name: Build Caro Demo (Windows)

on:
  push:
    paths:
      - 'doancaro/**'
      - '.github/workflows/msvc-build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache CMake FetchContent (raylib + Catch2)
        uses: actions/cache@v4
        with:
          path: doancaro/build/_deps
          key: fetchcontent-${{ runner.os }}-${{ hashFiles('doancaro/CMakeLists.txt') }}

      - name: Generate VS solution and build
        run: |
          cd doancaro
          cmake -B build -G "Visual Studio 17 2022" -A x64
          cmake --build build --config Release

      - name: Run unit tests
        run: doancaro\build\Release\CaroTests.exe

      - name: Prepare demo bundle
        run: |
          mkdir bundle
          copy doancaro\build\Release\CaroGame.exe bundle\
          xcopy doancaro\src bundle\src\ /E
          copy doancaro\CMakeLists.txt bundle\
          copy doancaro\README.md bundle\
          copy doancaro\build\CaroGame.sln bundle\
          copy doancaro\build\CaroGame.vcxproj bundle\
          copy doancaro\build\CaroGame.vcxproj.filters bundle\
        shell: cmd

      - name: Upload demo bundle
        uses: actions/upload-artifact@v4
        with:
          name: CaroGame-Demo
          path: bundle/
