name: Build Caro Demo (Windows)

on:
  push:
    paths:
      - 'doancaro/**'
      - '.github/workflows/msvc-build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate VS solution and build
        run: |
          cd doancaro
          cmake -B build -G "Visual Studio 17 2022" -A x64
          cmake --build build --config Release

      - name: Prepare demo bundle
        run: |
          mkdir bundle
          copy doancaro\build\Release\CaroGame.exe bundle\
          xcopy doancaro\src bundle\src\ /E
          copy doancaro\CMakeLists.txt bundle\
          copy doancaro\README.md bundle\
          copy doancaro\build\CaroGame.sln bundle\
          for /R doancaro\build %%f in (*.vcxproj *.vcxproj.filters) do copy "%%f" bundle\ 2>nul || true
        shell: cmd

      - name: Upload demo bundle
        uses: actions/upload-artifact@v4
        with:
          name: CaroGame-Demo
          path: bundle/

      - name: Upload VS project files
        uses: actions/upload-artifact@v4
        with:
          name: vs-project-files
          path: |
            doancaro/build/*.sln
            doancaro/build/**/*.vcxproj
            doancaro/build/**/*.vcxproj.filters
